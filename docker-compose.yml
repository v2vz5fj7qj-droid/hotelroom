version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bravia_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bravia_hotel_db
      MYSQL_USER: bravia
      MYSQL_PASSWORD: bravia_pass
    ports:
      - '3306:3306'
    volumes:
      - bravia_mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bravia_mysql_data:
